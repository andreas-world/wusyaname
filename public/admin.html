<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Wusyaname</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- ══ LAYAR LOGIN ══ -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-card">
    <div class="login-logo">Wusyaname <span>Admin</span></div>
    <p class="login-sub">Masuk untuk mengelola isi landing page</p>
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" required />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
    <button type="submit" class="btn-primary">Masuk</button>
    <p id="loginError" class="login-error"></p>
    <p class="login-hint">Default: <code>admin</code> / <code>admin123</code> — ganti di server.js</p>
  </form>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard" class="dashboard" style="display:none">
  <header class="topbar">
    <div class="topbar-logo">Wusyaname <span>Admin</span></div>
    <div class="topbar-actions">
      <a href="index.html" target="_blank" class="btn-ghost"><i class="fa-solid fa-eye"></i> Lihat Landing Page</a>
      <button id="logoutBtn" class="btn-ghost"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>
  </header>

  <main class="dash-main">
    <div id="saveBanner" class="save-banner"></div>

    <!-- HERO -->
    <section class="panel">
      <h2><i class="fa-solid fa-house"></i> Bagian Hero</h2>
      <div class="field">
        <label>Eyebrow (teks kecil di atas judul)</label>
        <input type="text" id="f-hero-eyebrow" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Judul baris 1 (yang bergradasi warna)</label>
          <input type="text" id="f-hero-title1" />
        </div>
        <div class="field">
          <label>Judul baris 2</label>
          <input type="text" id="f-hero-title2" />
        </div>
      </div>
      <div class="field">
        <label>Deskripsi hero</label>
        <textarea id="f-hero-desc" rows="3"></textarea>
      </div>
      <label class="subheading">Statistik (3 angka di hero)</label>
      <div class="field-row" id="statsFields"></div>
    </section>

    <!-- ABOUT -->
    <section class="panel">
      <h2><i class="fa-solid fa-circle-info"></i> Bagian Tentang</h2>
      <div class="field">
        <label>Deskripsi tentang Wusyaname</label>
        <textarea id="f-about-desc" rows="4"></textarea>
      </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="panel">
      <div class="panel-head">
        <h2><i class="fa-solid fa-quote-left"></i> Testimoni</h2>
        <button class="btn-add" onclick="addTestimonial()"><i class="fa-solid fa-plus"></i> Tambah</button>
      </div>
      <div id="testiFields"></div>
    </section>

    <!-- FAQ -->
    <section class="panel">
      <div class="panel-head">
        <h2><i class="fa-solid fa-circle-question"></i> FAQ</h2>
        <button class="btn-add" onclick="addFaq()"><i class="fa-solid fa-plus"></i> Tambah</button>
      </div>
      <div id="faqFields"></div>
    </section>

    <div class="save-bar">
      <button id="saveBtn" class="btn-primary btn-save"><i class="fa-solid fa-floppy-disk"></i> Simpan Semua Perubahan</button>
    </div>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
